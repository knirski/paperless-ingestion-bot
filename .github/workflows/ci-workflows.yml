# Complementary to ci.yml: runs when only .github/** changes.
# Minimal check: actionlint, shellcheck, shfmt on .github/actions.
# See docs/CI.md.

name: CI

on:
  push:
    branches:
      - main
    paths:
      - '.github/**'
  pull_request:
    branches:
      - main
    paths:
      - '.github/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-workflows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    uses: ./.github/workflows/check-workflows.yml
