# Paperless API live integration test. Runs only when paperless-related paths change.

name: CI (paperless-api integration)

on:
  push:
    branches:
      - main
    paths:
      - 'src/live/paperless-client.ts'
      - 'src/domain/errors.ts'
      - 'src/domain/paperless-types.ts'
      - 'test/integration/paperless*'
      - 'deploy/compose/**'
      - 'package.json'
      - 'bun.lock'
  pull_request:
    branches:
      - main
    paths:
      - 'src/live/paperless-client.ts'
      - 'src/domain/errors.ts'
      - 'src/domain/paperless-types.ts'
      - 'test/integration/paperless*'
      - 'deploy/compose/**'
      - 'package.json'
      - 'bun.lock'

concurrency:
  group: ci-paperless-api-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  paperless-api-integration:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run paperless-api live integration test
        run: bun run test:integration
        env:
          PAPERLESS_API_INTEGRATION_TEST: "1"
