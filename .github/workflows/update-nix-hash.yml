# Updates npmDepsHash in default.nix. Manual fix when main is stale.
# ci-nix.yml handles updates on push and PR when nix/deps change.
# Reuses the nix workflow (same-repo, push allowed).

name: Update Nix hash

on:
  workflow_dispatch:

permissions: {}

jobs:
  update-hash:
    permissions:
      contents: write
    uses: ./.github/workflows/nix.yml
    secrets: inherit
