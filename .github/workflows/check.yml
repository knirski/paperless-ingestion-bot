# Reusable workflow: run full check (test, lint, typecheck, rumdl, typos, actionlint, shellcheck, lychee, SBOM, Codecov).
# Called by ci.yml (runs when non-.md files change).
# No Nix — uses GitHub Actions for rumdl/typos/lychee/actionlint/shellcheck.

name: Check

on:
  workflow_call:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup runtime (Node or alternative) with cache
        id: setup
        uses: knirski/auto-pr/.github/actions/setup-runtime@28f9b0c664094b17c1c60837adb9e18cef1478ad

      - name: Setup Node (for SBOM)
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "lts/*"

      - name: Generate SBOM
        run: npm install && npm sbom --sbom-format cyclonedx > sbom.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Upload SBOM
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sbom
          path: sbom.json

      - name: Validate commit messages
        uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1

      - name: Check code (test, lint, typecheck)
        run: bun run check:code

      - name: Markdown lint
        uses: rvben/rumdl@8c1798b13cf961c88a4c5d1136448f4f4391383d # v0.1.47

      - name: Spell check
        uses: crate-ci/typos@631208b7aac2daa8b707f55e7331f9112b0e062d # v1.44.0

      - name: Lint workflows
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2.1.2

      - name: Lint scripts
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
        with:
          scandir: ./scripts

      - name: Format check scripts (shfmt)
        uses: mfinelli/setup-shfmt@a25fda4c1fe115aec0f85e04126610841bc3141d # v4.0.1
      - name: Run shfmt
        run: shfmt -d scripts

      - name: Check links
        continue-on-error: true
        timeout-minutes: 2
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --timeout 90 --max-retries 10 --retry-wait-time 2 --no-progress --accept 200,429 .

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9d0130fbe1cec585b89eea48d3de # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          plugins: noop
          disable_search: true

      - name: Upload test results to Codecov
        uses: codecov/codecov-action@671740ac38dd9d0130fbe1cec585b89eea48d3de # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./test-report.junit.xml
          report_type: test_results
