# Reusable workflow for docs-only PRs.
# Runs rumdl (markdown lint), lychee (link check), typos (spell check).
# No bun install — all tools run via GitHub Actions.
# Reports "check / check" so branch protection allows merge.
# See docs/CI.md.

name: Check

on:
  workflow_call:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Markdown lint
        uses: rvben/rumdl@6540b53fa24e83f9693e36889e0f9c765aa90349 # v0.1.67

      - name: Check links
        continue-on-error: true
        timeout-minutes: 2
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --timeout 90 --max-retries 20 --retry-wait-time 5 --no-progress --accept 200,429 .

      - name: Spell check
        uses: crate-ci/typos@02ea592e44b3a53c302f697cddca7641cd051c3d # v1.45.0
