# Reusable workflow for docs-only PRs.
# Runs rumdl (markdown lint), lychee (link check), typos (spell check).
# No bun install — all tools run via GitHub Actions.
# Reports "check / check" so branch protection allows merge.
# See docs/CI.md.

name: Check

on:
  workflow_call:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Markdown lint
        uses: rvben/rumdl@8e22c9b16f49c7209355106f731500cc1aacef20 # v0.1.62

      - name: Check links
        continue-on-error: true
        timeout-minutes: 2
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --timeout 90 --max-retries 20 --retry-wait-time 5 --no-progress --accept 200,429 .

      - name: Spell check
        uses: crate-ci/typos@631208b7aac2daa8b707f55e7331f9112b0e062d # v1.44.0
