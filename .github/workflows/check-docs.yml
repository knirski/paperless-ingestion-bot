# Reusable workflow for docs-only PRs.
# Runs rumdl (markdown lint), lychee (link check), typos (spell check).
# No npm ci — all tools run via GitHub Actions.
# Reports "check / check" so branch protection allows merge.
# See docs/CI.md.

name: Check

on:
  workflow_call:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Markdown lint
        uses: rvben/rumdl@8c1798b13cf961c88a4c5d1136448f4f4391383d # v0.1.47

      - name: Check links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0

      - name: Spell check
        uses: crate-ci/typos@631208b7aac2daa8b707f55e7331f9112b0e062d # v1.44.0
