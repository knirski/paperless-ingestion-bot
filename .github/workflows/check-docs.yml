# Reusable workflow for docs-only PRs.
# Runs rumdl (markdown lint), lychee (link check), typos (spell check).
# No npm ci — all tools run via GitHub Actions.
# Reports "check / check" so branch protection allows merge.
# See docs/CI.md.

name: Check

on:
  workflow_call:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Markdown lint
        uses: rvben/rumdl@79a29f34ace341acdf6109777c3c22fcef0cfb6e # v0.1.51

      - name: Check links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --timeout 30 --max-retries 5 --no-progress .

      - name: Spell check
        uses: crate-ci/typos@631208b7aac2daa8b707f55e7331f9112b0e062d # v1.44.0
