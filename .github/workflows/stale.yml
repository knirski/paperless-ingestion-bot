name: Stale

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed in 14 days if no further activity occurs.
            Thank you for your contributions.
          close-issue-message: >
            This issue was closed due to inactivity. Feel free to reopen if the
            issue persists.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has
            not had recent activity. It will be closed in 14 days if no further
            activity occurs.
          close-pr-message: >
            This pull request was closed due to inactivity. Feel free to reopen if
            you'd like to continue.
          days-before-stale: 180
          days-before-close: 180
          exempt-issue-labels: "pinned,security"
          exempt-pr-labels: "pinned,security"
