# Complementary to codeql.yml: runs when only docs change.
# CodeQL is skipped for docs (paths-ignore); this reports passing status so merge is allowed.
# Same job names as codeql.yml so branch protection / code scanning is satisfied.
# Distinct workflow name avoids conflict with codeql.yml in code scanning UI.

name: CodeQL (docs pass-through)

on:
  pull_request:
    branches:
      - main
    paths:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/FUNDING.yml'

permissions: {}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
          - language: javascript-typescript
    steps:
      - run: echo "Docs-only change, no CodeQL scan required"
