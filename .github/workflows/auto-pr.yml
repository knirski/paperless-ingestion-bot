name: Auto-PR

on:
  push:
    branches:
      - 'ai/**'

concurrency:
  group: auto-pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-pr:
    if: github.event.repository.fork != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci

      - name: Fetch base branch
        run: git fetch origin ${{ github.event.repository.default_branch }}

      - name: Get commit log and changed files
        id: commits
        run: |
          BASE_REF="origin/${{ github.event.repository.default_branch }}"
          git log --format="---COMMIT---%n%s%n%n%b" "$BASE_REF..HEAD" > commits.txt
          git log --format="%s" "$BASE_REF..HEAD" > subjects.txt
          git diff --name-only "$BASE_REF..HEAD" > files.txt
          COUNT=$(wc -l < subjects.txt | tr -d ' ')
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::No commits to push. Add at least one commit before pushing to ai/ branch."
            exit 1
          fi
          echo "commits=${{ github.workspace }}/commits.txt" >> $GITHUB_OUTPUT
          echo "files=${{ github.workspace }}/files.txt" >> $GITHUB_OUTPUT
          echo "first-commit-title=$(head -1 subjects.txt)" >> $GITHUB_OUTPUT
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "subjects<<COMMITLIST" >> $GITHUB_OUTPUT
          sed 's/^/- /' subjects.txt >> $GITHUB_OUTPUT
          echo "COMMITLIST" >> $GITHUB_OUTPUT

      - name: Generate PR title via Ollama
        id: ollama
        if: steps.commits.outputs.count != '1'
        uses: ai-action/ollama-action@v2
        with:
          model: llama3.1:8b
          prompt: |
            Generate a single conventional commit title (max 72 chars) that summarizes this PR.
            Format: type(scope): subject (e.g. feat: add X, fix(ci): resolve bug).
            Use the most significant type from the commits. Reply with only the title, nothing else.

            Commits:
            ${{ steps.commits.outputs.subjects}}

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          COMMITS: ${{ steps.commits.outputs.commits }}
          FILES: ${{ steps.commits.outputs.files }}
          PR_TITLE: ${{ steps.ollama.outputs.response || steps.commits.outputs.first-commit-title }}
        run: bash scripts/create-or-update-pr.sh