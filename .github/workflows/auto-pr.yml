name: Auto-PR

on:
  push:
    branches:
      - 'ai/**'

concurrency:
  group: auto-pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-pr:
    if: github.event.repository.fork != true
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL || 'llama3.1:8b' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci

      - name: Fetch base branch
        run: git fetch origin "${{ github.event.repository.default_branch }}"

      - name: Get commit log and changed files
        id: commits
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: bash .github/scripts/auto-pr-get-commits.sh

      - name: Setup Ollama
        if: steps.commits.outputs.count != '1'
        uses: ai-action/setup-ollama@71ea83e32be8721c648fa946c5da9853679a3803 # v2

      - name: Pull model
        if: steps.commits.outputs.count != '1'
        run: ollama pull ${{ env.OLLAMA_MODEL }}

      - name: Set PR title
        id: title
        env:
          COMMIT_COUNT: ${{ steps.commits.outputs.count }}
          OLLAMA_MODEL: ${{ env.OLLAMA_MODEL }}
        run: bash .github/scripts/auto-pr-set-title.sh

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bf559f85448f9380bcfa2899dbdc01eb5b37be3a # v3.0.0-beta.2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          COMMITS: ${{ steps.commits.outputs.commits }}
          FILES: ${{ steps.commits.outputs.files }}
          PR_TITLE: ${{ steps.title.outputs.title }}
        run: bash .github/scripts/create-or-update-pr.sh