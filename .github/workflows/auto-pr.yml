# Auto-PR — uses knirski/auto-pr reusable workflows. Push to ai/* to auto-create a PR.
# See https://github.com/knirski/auto-pr/blob/main/docs/INTEGRATION.md
#
# Update @SHA refs when upgrading auto-pr (use SHA from auto-pr's main).

name: Auto-PR

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - "ai/**"

concurrency:
  group: auto-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    if: github.event.repository.fork != true && github.ref_name != github.event.repository.default_branch
    uses: knirski/auto-pr/.github/workflows/auto-pr-generate-reusable.yml@28f9b0c664094b17c1c60837adb9e18cef1478ad
    with:
      auto_pr_how_to_test: "1. Run `npm run check` or `bun run check`\n2. "

  create:
    needs: generate
    uses: knirski/auto-pr/.github/workflows/auto-pr-create-reusable.yml@28f9b0c664094b17c1c60837adb9e18cef1478ad
    with:
      auto_pr_pkg: ${{ needs.generate.outputs.auto_pr_pkg }}
    secrets: inherit
