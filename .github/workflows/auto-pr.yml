# Auto-PR — uses knirski/auto-pr reusable workflows. Push to ai/* to auto-create a PR.
# See https://github.com/knirski/auto-pr/blob/main/docs/INTEGRATION.md
#
# Update @SHA refs when upgrading auto-pr (use SHA from auto-pr's main).

name: Auto-PR

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - "ai/**"

concurrency:
  group: auto-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    if: github.event.repository.fork != true
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup runtime
        id: setup
        uses: ./.github/actions/setup-runtime

      - name: Install dependencies
        env:
          RUNNER: ${{ steps.setup.outputs.runner }}
        run: |
          if [ "$RUNNER" = "bunx" ]; then
            bun install --frozen-lockfile
          else
            npm ci
          fi

      - name: Check
        env:
          RUNNER: ${{ steps.setup.outputs.runner }}
        run: |
          if [ "$RUNNER" = "bunx" ]; then bun run check; else npm run check; fi

  generate:
    needs: check
    if: github.event.repository.fork != true
    uses: knirski/auto-pr/.github/workflows/auto-pr-generate-reusable.yml@f49b41fbdd1397689d6cafc1e579807447e1af04
    with:
      auto_pr_how_to_test: "1. Run `npm run check` or `bun run check`\n2. "

  create:
    needs: generate
    if: github.event.repository.fork != true
    uses: knirski/auto-pr/.github/workflows/auto-pr-create-reusable.yml@f49b41fbdd1397689d6cafc1e579807447e1af04
    with:
      auto_pr_pkg: ${{ needs.generate.outputs.auto_pr_pkg }}
    secrets: inherit
