name: Create or update PR from AI branch

on:
  push:
    branches:
      - 'ai/**'

concurrency:
  group: auto-pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    if: github.event.repository.fork != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - run: npm ci

      - name: Fetch base branch
        run: git fetch origin ${{ github.event.repository.default_branch }}

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-${{ runner.os }}-llama3.2-1b

      - name: Pull Ollama model
        run: ollama pull llama3.2:1b

      - name: Start Ollama
        run: |
          ollama serve &
          if timeout 30 bash -c 'until curl -sf http://localhost:11434/api/tags >/dev/null; do sleep 1; done'; then
            echo "Ollama ready"
          else
            echo "::error::Ollama failed to start within 30s"
            exit 1
          fi

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Create or update pull request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="${{ github.ref_name }}"
          DEFAULT="${{ github.event.repository.default_branch }}"
          OUTPUT=$(npx tsx scripts/fill-pr-body.ts "origin/$DEFAULT" --format title-body --ai-title --quiet)
          TITLE=$(echo "$OUTPUT" | head -1)
          if [ -z "$TITLE" ]; then
            echo "::error::PR title is empty. Add at least one non-merge commit with non-empty subject (e.g. feat: add X) before pushing."
            exit 1
          fi
          echo "$OUTPUT" | tail -n +3 > /tmp/pr-body.md
          for attempt in 1 2 3; do
            if gh pr create --base "$DEFAULT" --title "$TITLE" --body-file /tmp/pr-body.md --draft 2>/tmp/gh-err; then
              echo "PR created"
              exit 0
            fi
            err=$(cat /tmp/gh-err)
            if echo "$err" | grep -q "already exists"; then
              echo "PR already exists, updating..."
              if gh pr edit --title "$TITLE" --body-file /tmp/pr-body.md; then
                exit 0
              fi
            else
              echo "::error::gh pr create failed: $err"
              exit 1
            fi
            [ "$attempt" -lt 3 ] && { echo "::warning::gh failed (attempt $attempt/3), retrying in 5s..."; sleep 5; }
          done
          echo "::error::gh failed after 3 attempts"
          exit 1
