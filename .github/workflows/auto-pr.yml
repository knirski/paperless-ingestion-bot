name: Auto-PR

on:
  push:
    branches:
      - 'ai/**'

concurrency:
  group: auto-pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-pr:
    if: github.event.repository.fork != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - run: npm ci

      - name: Fetch base branch
        run: git fetch origin ${{ github.event.repository.default_branch }}

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-${{ runner.os }}-llama3.2-1b

      - name: Pull Ollama model
        run: |
          ollama pull llama3.2:1b
          if ! timeout 30 bash -c 'until curl -sf http://localhost:11434/api/tags >/dev/null; do sleep 1; done'; then
            echo "::error::Ollama not reachable within 30s (ollama pull should start it)"
            exit 1
          fi

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Debug gh pr view
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "::group::gh pr view $BRANCH"
          set +e
          out=$(gh pr view "$BRANCH" 2>&1)
          code=$?
          set -e
          echo "exit code: $code"
          echo "$out"
          echo "::endgroup::"

      - name: Create or update pull request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: bash scripts/create-or-update-pr.sh "${{ github.ref_name }}" "${{ github.event.repository.default_branch }}"
