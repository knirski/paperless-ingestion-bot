name: Auto-PR

on:
  push:
    branches:
      - 'ai/**'

concurrency:
  group: auto-pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-pr:
    if: github.event.repository.fork != true
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci

      - name: Fetch base branch
        run: git fetch origin "${{ github.event.repository.default_branch }}"

      - name: Get commit log and changed files
        id: commits
        run: |
          BASE_REF="origin/${{ github.event.repository.default_branch }}"
          git log --format="---COMMIT---%n%s%n%n%b" "$BASE_REF..HEAD" > commits.txt
          git log --format="%s" "$BASE_REF..HEAD" > subjects.txt
          git diff --name-only "$BASE_REF..HEAD" > files.txt
          COUNT=$(wc -l < subjects.txt | tr -d ' ')
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::No commits to push. Add at least one commit before pushing to ai/ branch."
            exit 1
          fi
          {
            echo "commits=${{ github.workspace }}/commits.txt"
            echo "files=${{ github.workspace }}/files.txt"
            echo "count=$COUNT"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Ollama
        if: steps.commits.outputs.count != '1'
        uses: ai-action/setup-ollama@71ea83e32be8721c648fa946c5da9853679a3803 # v2

      - name: Restore Ollama model cache
        if: steps.commits.outputs.count != '1'
        id: ollama-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: /home/runner/.ollama
          key: ollama-llama3.1-8b-${{ runner.os }}

      - name: Ensure model loaded
        if: steps.commits.outputs.count != '1'
        run: ollama pull llama3.1:8b

      - name: Save Ollama model cache
        if: steps.commits.outputs.count != '1' && steps.ollama-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: /home/runner/.ollama
          key: ollama-llama3.1-8b-${{ runner.os }}

      - name: Set PR title
        id: title
        run: |
          if [ "${{ steps.commits.outputs.count }}" = "1" ]; then
            TITLE=$(head -1 subjects.txt)
          else
            {
              echo "Generate a single conventional commit title (max 72 chars) that summarizes this PR."
              echo "Format: type(scope): subject (e.g. feat: add X, fix(ci): resolve bug)."
              echo "Use the most significant type from the commits. Reply with only the title, nothing else."
              echo ""
              echo "Commits:"
              sed 's/^/- /' subjects.txt
            } > prompt.txt
            BODY=$(jq -n --rawfile p prompt.txt '{model: "llama3.1:8b", prompt: $p, stream: false}')
            RAW=$(curl -s http://localhost:11434/api/generate -d "$BODY" | jq -r '.response')
            TITLE=$(echo "$RAW" | sed 's/^"//;s/"$//' | head -1)
            if [ -z "$TITLE" ] || [ "$TITLE" = "null" ]; then
              echo "::error::Failed to generate PR title with Ollama. Using first commit subject as fallback."
              TITLE=$(head -1 subjects.txt)
            fi
          fi
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          COMMITS: ${{ steps.commits.outputs.commits }}
          FILES: ${{ steps.commits.outputs.files }}
          PR_TITLE: ${{ steps.title.outputs.title }}
        run: bash scripts/create-or-update-pr.sh