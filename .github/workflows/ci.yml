# CI: check, dependency-review, nix build.
# Uses GitHub reusable workflows, paths-filter for conditional jobs,
# concurrency for cancel-in-progress, least-privilege permissions.
#
# Paths filter rationale:
# - code: triggers check (test, lint, typecheck, SBOM, Codecov) and dependency-review
# - nix: triggers Nix build and npmDepsHash update

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      nix: ${{ steps.filter.outputs.nix }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            code:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.mjs'
              - '**/*.sh'
              - '**/*.json'
              - '**/*.nix'
              - '.github/**'
              - '.allstar/**'
              - '.husky/**'
              - '**/Dockerfile'
              - '**/.dockerignore'
              - '**/.nvmrc'
              - '**/.editorconfig'
              - '**/*.md'
              - 'CODEOWNERS'
              - 'LICENSE'
            nix:
              - '**/*.nix'
              - 'package*.json'
              - 'flake.lock'

  dependency-review:
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4

  check:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    uses: ./.github/workflows/check.yml
    secrets: inherit

  nix:
    needs: changes
    if: (github.event_name == 'push' && needs.changes.outputs.code == 'true') || (github.event_name == 'pull_request' && needs.changes.outputs.nix == 'true')
    uses: ./.github/workflows/nix.yml
    with:
      ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
      push_allowed: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    secrets: inherit
