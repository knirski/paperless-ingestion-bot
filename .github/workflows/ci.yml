name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      nix: ${{ steps.filter.outputs.nix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            code:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.mjs'
              - '**/*.json'
              - '**/*.nix'
              - '.github/**'
              - '.husky/**'
              - '**/Dockerfile'
              - '**/.dockerignore'
              - '**/.nvmrc'
              - '**/.editorconfig'
            nix:
              - '**/*.nix'
              - 'package*.json'

  dependency-review:
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4

  check:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Docs-only (skip full CI)
        if: needs.changes.outputs.code != 'true'
        run: echo "Documentation-only change, skipping full CI"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        if: needs.changes.outputs.code == 'true'
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - run: npm ci
        if: needs.changes.outputs.code == 'true'

      - name: Generate SBOM
        if: needs.changes.outputs.code == 'true'
        run: npx @cyclonedx/cyclonedx-npm@4.2.0 --output-file sbom.json

      - name: Upload SBOM
        if: needs.changes.outputs.code == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sbom
          path: sbom.json

      - name: Audit dependencies
        if: needs.changes.outputs.code == 'true'
        run: npm audit --audit-level=high

      - name: Lint workflow files
        if: needs.changes.outputs.code == 'true'
        uses: eifinger/actionlint-action@7802e0cc3ab3f81cbffb36fb0bf1a3621d994b89 # v1.10.1

      - name: Validate commit messages
        if: needs.changes.outputs.code == 'true' && github.actor != 'dependabot[bot]'
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx commitlint --from=origin/main --to=HEAD
          else
            BEFORE="${{ github.event.before }}"
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              echo "Skipping commitlint: initial push (no previous commit)"
            else
              npx commitlint --from="$BEFORE" --to=${{ github.sha }}
            fi
          fi

      - run: npm run check
        if: needs.changes.outputs.code == 'true'

      - name: Upload coverage to Codecov
        if: needs.changes.outputs.code == 'true'
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: needs.changes.outputs.code == 'true'
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./test-report.junit.xml
          report_type: test_results

  nix:
    needs: changes
    if: (github.event_name == 'push' && needs.changes.outputs.code == 'true') || (github.event_name == 'pull_request' && needs.changes.outputs.nix == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: DeterminateSystems/nix-installer-action@d96bc962e61b3049ce8128d03d57a1144fa96539 # main
      - name: Verify npmDepsHash
        run: |
          expected=$(nix run nixpkgs#prefetch-npm-deps -- package-lock.json)
          if [ -z "$expected" ]; then
            echo "::error::prefetch-npm-deps failed or returned empty"
            exit 1
          fi
          current=$(sed -n 's/.*npmDepsHash = "\([^"]*\)".*/\1/p' default.nix | head -1)
          if [ "$expected" != "$current" ]; then
            echo "::error::npmDepsHash mismatch. default.nix has stale hash."
            echo ""
            echo "With Nix locally: nix run .#update-npm-deps-hash"
            echo "Without Nix: npm run update-nix-hash -- $expected"
            echo ""
            echo "Then commit default.nix with your package-lock.json changes."
            exit 1
          fi
      # Skip magic-nix-cache-action: requires FlakeHub registration; default cache.nixos.org works
      - run: nix build .#default
