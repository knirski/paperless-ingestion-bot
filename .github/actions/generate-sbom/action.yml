# Generate CycloneDX SBOM from project dependencies (bun.lock) and optionally upload.
# Requires: checkout and bun install must run before this action.
# Outputs: sbom.json in workspace root.
#
# Used by: check.yml (upload=artifact), docker.yml sbom job (upload=release).

name: "Generate SBOM"
description: "Generate CycloneDX SBOM via Trivy fs scan. Optionally upload as artifact or to release."

inputs:
  upload:
    description: "Upload target: 'artifact' | 'release' | 'none'"
    required: false
    default: "none"
  release_tag:
    description: "Release tag (required when upload=release)"
    required: false
    default: ""
  artifact_name:
    description: "Artifact name (when upload=artifact)"
    required: false
    default: "sbom"

runs:
  using: composite
  steps:
    - name: Generate SBOM
      uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # v0.33.1
      with:
        scan-type: "fs"
        scan-ref: "."
        format: "cyclonedx"
        output: "sbom.json"

    - name: Upload SBOM
      if: inputs.upload == 'artifact'
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: ${{ inputs.artifact_name }}
        path: sbom.json

    - name: Upload SBOM to release
      if: inputs.upload == 'release' && inputs.release_tag != ''
      uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
      with:
        tag_name: ${{ inputs.release_tag }}
        files: sbom.json
        fail_on_unmatched_files: false
