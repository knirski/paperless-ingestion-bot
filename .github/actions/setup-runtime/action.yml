# Composite action: set up the runtime that matches the project's lockfile, with cache.
# Detects: packageManager (canonical) > lockfile (bun.lock, bun.lockb, package-lock.json, yarn.lock, pnpm-lock.yaml) > default node npx.
# Non-JS projects: no package.json/lockfile → node npx (runs auto-pr).
# Outputs: runner (npx|bunx) for package execution; node-version-file used when Node.
#
# Use when the job needs to run package binaries (npx/bunx -p) or install deps.
# Callers use: ${{ steps.setup.outputs.runner }} -p "$PKG" <cmd>

name: Setup runtime (Node or alternative) with cache
description: Detect lockfile and set up matching runtime with cache when supported

inputs:
  node-version-file:
    description: "Path to .nvmrc for Node version (default .nvmrc)"
    required: false
    default: ".nvmrc"
  bun-version:
    description: "Bun version when bun.lock detected (empty = auto-detect from packageManager)"
    required: false
    default: ""

outputs:
  runner:
    description: "Package runner: npx or bunx"
    value: ${{ steps.detect.outputs.runner }}
  cache-hit:
    description: "Whether cache was restored (from setup-bun when used)"
    value: ${{ steps.setup-bun.outputs.cache-hit || steps.setup-node.outputs.cache-hit || 'false' }}

runs:
  using: composite
  steps:
    - name: Detect lockfile and runtime
      id: detect
      shell: bash
      run: bash "$GITHUB_ACTION_PATH/detect-runtime.sh" >> "$GITHUB_OUTPUT"

    - name: Setup pnpm
      if: steps.detect.outputs.cache == 'pnpm'
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      with:
        run_install: false

    - name: Setup Node (with cache)
      if: steps.detect.outputs.cache == 'npm' || steps.detect.outputs.cache == 'yarn' || steps.detect.outputs.cache == 'pnpm'
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version-file: ${{ inputs.node-version-file }}
        cache: ${{ steps.detect.outputs.cache }}

    - name: Setup Node (no cache)
      if: steps.detect.outputs.runtime == 'node' && steps.detect.outputs.cache != 'npm' && steps.detect.outputs.cache != 'yarn' && steps.detect.outputs.cache != 'pnpm'
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version-file: ${{ inputs.node-version-file }}

    - name: Setup Bun
      if: steps.detect.outputs.runtime == 'bun'
      id: setup-bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version: ${{ inputs.bun-version }}
