# Composite action: checkout, install Nix, enable magic cache.
# Reused by ci (nix job), update-nix-hash, update-flake-lock.
#
# Inputs:
#   ref: Checkout ref (e.g. PR head for ci). Omit for default.
#   fetch-depth: Git fetch depth. Default 0 (full history).

name: "Nix setup"
description: "Checkout repo, install Nix, enable magic-nix-cache"

inputs:
  ref:
    description: "Checkout ref (e.g. PR head for ci). Omit for default."
    required: false
    default: ""
  fetch-depth:
    description: "Git fetch depth (0 = full history)"
    required: false
    default: "0"

runs:
  using: composite
  steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: ${{ inputs.fetch-depth }}
        ref: ${{ inputs.ref || github.ref }}

    - uses: DeterminateSystems/nix-installer-action@c5a866b6ab867e88becbed4467b93592bce69f8a # v21

    - uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13
