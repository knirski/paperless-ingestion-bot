# Runs update-npm-deps-hash.sh and exposes hash output when an update was made.
# Requires: nix-setup (or equivalent checkout + Nix) must run first.

name: "Nix npmDepsHash update"
description: "Update npmDepsHash in default.nix when package-lock.json changed"

outputs:
  hash:
    description: "New hash when update was made; empty when no update needed"
    value: ${{ steps.hash.outputs.hash }}

runs:
  using: composite
  steps:
    - id: hash
      shell: bash
      run: |
        output=$(./scripts/update-npm-deps-hash.sh)
        if [ -n "$output" ]; then
          echo "$output" >> "$GITHUB_OUTPUT"
        fi
