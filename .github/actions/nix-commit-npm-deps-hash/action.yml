# Commits and pushes npmDepsHash update to default.nix.
# Requires: nix-npm-deps-hash (or equivalent) must have modified default.nix.
# Call only when hash was updated and push is allowed (same-repo PR or push).

name: "Nix commit npmDepsHash"
description: "Commit and push npmDepsHash update"

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add default.nix
        git commit -m "fix(nix): update npmDepsHash for package-lock.json"
        git push
